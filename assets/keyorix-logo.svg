<svg width="160" height="40" viewBox="0 0 160 40" fill="none" xmlns="http://www.w3.org/2000/svg">
  <!-- Modern Keyorix Logo - Professional Design -->
  
  <!-- Key Symbol - Geometric and Modern -->
  <g transform="translate(0, 8)">
    <!-- Key body with gradient -->
    <defs>
      <linearGradient id="keyGradient" x1="0%" y1="0%" x2="100%" y2="0%">
        <stop offset="0%" style="stop-color:#2D9CDB;stop-opacity:1" />
        <stop offset="100%" style="stop-color:#8B5CF6;stop-opacity:1" />
      </linearGradient>
    </defs>
    
    <!-- Main key shape -->
    <path d="M2 10 L14 10 C16 10 18 8 18 6 C18 4 16 2 14 2 L6 2 C4 2 2 4 2 6 Z" fill="url(#keyGradient)"/>
    
    <!-- Key teeth - modern geometric -->
    <rect x="18" y="8" width="3" height="2" fill="url(#keyGradient)"/>
    <rect x="18" y="11" width="4" height="2" fill="url(#keyGradient)"/>
    <rect x="18" y="14" width="2" height="2" fill="url(#keyGradient)"/>
    
    <!-- Security accent - small shield -->
    <path d="M8 6 L10 5 L12 6 L12 10 C12 11 10 12 10 12 C10 12 8 11 8 10 Z" fill="#E6E6E6" opacity="0.9"/>
    <circle cx="10" cy="8.5" r="1" fill="#2D9CDB"/>
  </g>
  
  <!-- Keyorix Text - Professional Typography -->
  <text x="32" y="26" font-family="Inter, -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" 
        font-size="20" font-weight="700" fill="#E6E6E6" letter-spacing="-0.02em">Keyorix</text>
  
  <!-- Subtle accent line under text -->
  <rect x="32" y="30" width="60" height="1" fill="url(#keyGradient)" opacity="0.6"/>
</svg>