<svg width="500" height="400" viewBox="0 0 500 400" fill="none" xmlns="http://www.w3.org/2000/svg">
  <!-- Background glow -->
  <circle cx="250" cy="200" r="180" fill="url(#heroGlow)" opacity="0.3"/>
  
  <!-- Central security shield -->
  <g transform="translate(200, 150)">
    <path d="M50 10L80 25V65C80 75 70 85 50 90C30 85 20 75 20 65V25L50 10Z" fill="url(#shieldGradient)" stroke="url(#borderGradient)" stroke-width="2"/>
    <!-- Lock icon inside shield -->
    <rect x="42" y="40" width="16" height="20" rx="2" fill="white" opacity="0.9"/>
    <path d="M45 40V35C45 32 47 30 50 30C53 30 55 32 55 35V40" stroke="white" stroke-width="2" fill="none" opacity="0.9"/>
    <circle cx="50" cy="48" r="2" fill="#00C4FF"/>
  </g>
  
  <!-- Floating key elements -->
  <g opacity="0.7">
    <!-- Key 1 -->
    <g transform="translate(120, 100) rotate(15)">
      <rect x="0" y="8" width="20" height="6" rx="3" fill="url(#keyGradient)"/>
      <circle cx="6" cy="11" r="8" fill="none" stroke="url(#keyGradient)" stroke-width="2"/>
      <rect x="20" y="9" width="3" height="2" fill="url(#keyGradient)"/>
      <rect x="20" y="11" width="4" height="2" fill="url(#keyGradient)"/>
    </g>
    
    <!-- Key 2 -->
    <g transform="translate(320, 120) rotate(-20)">
      <rect x="0" y="8" width="18" height="5" rx="2.5" fill="url(#keyGradient2)"/>
      <circle cx="5" cy="10.5" r="7" fill="none" stroke="url(#keyGradient2)" stroke-width="2"/>
      <rect x="18" y="9" width="2" height="1.5" fill="url(#keyGradient2)"/>
      <rect x="18" y="10.5" width="3" height="1.5" fill="url(#keyGradient2)"/>
    </g>
    
    <!-- Key 3 -->
    <g transform="translate(150, 280) rotate(25)">
      <rect x="0" y="7" width="16" height="4" rx="2" fill="url(#keyGradient)"/>
      <circle cx="4" cy="9" r="6" fill="none" stroke="url(#keyGradient)" stroke-width="1.5"/>
      <rect x="16" y="8" width="2" height="1" fill="url(#keyGradient)"/>
      <rect x="16" y="9" width="3" height="1" fill="url(#keyGradient)"/>
    </g>
  </g>
  
  <!-- Data flow lines -->
  <g opacity="0.4">
    <path d="M100 200 Q 175 150 250 200 Q 325 250 400 200" stroke="url(#flowGradient)" stroke-width="2" fill="none" stroke-dasharray="5,5">
      <animate attributeName="stroke-dashoffset" values="0;-20" dur="3s" repeatCount="indefinite"/>
    </path>
    <path d="M80 250 Q 150 200 220 250 Q 290 300 360 250" stroke="url(#flowGradient)" stroke-width="2" fill="none" stroke-dasharray="5,5">
      <animate attributeName="stroke-dashoffset" values="0;-20" dur="4s" repeatCount="indefinite"/>
    </path>
  </g>
  
  <!-- Hexagonal nodes -->
  <g opacity="0.8">
    <!-- Node 1 -->
    <g transform="translate(80, 180)">
      <path d="M10 2L18 6V14L10 18L2 14V6L10 2Z" fill="url(#nodeGradient)" stroke="url(#borderGradient)" stroke-width="1"/>
      <circle cx="10" cy="10" r="3" fill="white" opacity="0.9"/>
    </g>
    
    <!-- Node 2 -->
    <g transform="translate(380, 180)">
      <path d="M10 2L18 6V14L10 18L2 14V6L10 2Z" fill="url(#nodeGradient)" stroke="url(#borderGradient)" stroke-width="1"/>
      <circle cx="10" cy="10" r="3" fill="white" opacity="0.9"/>
    </g>
    
    <!-- Node 3 -->
    <g transform="translate(200, 320)">
      <path d="M10 2L18 6V14L10 18L2 14V6L10 2Z" fill="url(#nodeGradient)" stroke="url(#borderGradient)" stroke-width="1"/>
      <circle cx="10" cy="10" r="3" fill="white" opacity="0.9"/>
    </g>
  </g>
  
  <!-- Floating particles -->
  <g opacity="0.6">
    <circle cx="120" cy="80" r="2" fill="#00C4FF">
      <animate attributeName="cy" values="80;60;80" dur="4s" repeatCount="indefinite"/>
    </circle>
    <circle cx="350" cy="90" r="1.5" fill="#6B73FF">
      <animate attributeName="cy" values="90;70;90" dur="3s" repeatCount="indefinite"/>
    </circle>
    <circle cx="180" cy="350" r="2.5" fill="#00C4FF">
      <animate attributeName="cy" values="350;330;350" dur="5s" repeatCount="indefinite"/>
    </circle>
    <circle cx="320" cy="340" r="1" fill="#6B73FF">
      <animate attributeName="cy" values="340;320;340" dur="3.5s" repeatCount="indefinite"/>
    </circle>
  </g>
  
  <!-- Gradient Definitions -->
  <defs>
    <radialGradient id="heroGlow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" style="stop-color:#00C4FF;stop-opacity:0.4" />
      <stop offset="100%" style="stop-color:#6B73FF;stop-opacity:0.1" />
    </radialGradient>
    
    <linearGradient id="shieldGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#00C4FF;stop-opacity:0.9" />
      <stop offset="100%" style="stop-color:#6B73FF;stop-opacity:0.9" />
    </linearGradient>
    
    <linearGradient id="keyGradient" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#00C4FF;stop-opacity:0.8" />
      <stop offset="100%" style="stop-color:#6B73FF;stop-opacity:0.8" />
    </linearGradient>
    
    <linearGradient id="keyGradient2" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#6B73FF;stop-opacity:0.8" />
      <stop offset="100%" style="stop-color:#00C4FF;stop-opacity:0.8" />
    </linearGradient>
    
    <linearGradient id="nodeGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#00C4FF;stop-opacity:0.7" />
      <stop offset="100%" style="stop-color:#6B73FF;stop-opacity:0.7" />
    </linearGradient>
    
    <linearGradient id="flowGradient" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#00C4FF;stop-opacity:0.6" />
      <stop offset="50%" style="stop-color:#6B73FF;stop-opacity:0.8" />
      <stop offset="100%" style="stop-color:#00C4FF;stop-opacity:0.6" />
    </linearGradient>
    
    <linearGradient id="borderGradient" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#00C4FF;stop-opacity:0.5" />
      <stop offset="100%" style="stop-color:#6B73FF;stop-opacity:0.5" />
    </linearGradient>
  </defs>
</svg>